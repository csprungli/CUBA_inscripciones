<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscripción a Campeonatos</title>
  <!-- Favicon con el logo de CUBA -->
  <link rel="icon" type="image/png" href="{{ cuba_logo }}"> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/Escudo CUBA.ico') }}">
  <style>
    .camp-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .camp-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
      border-color: #0d6efd;
    }
  </style>
</head>
<body>
<header class="py-4 mt-2">
  <div class="container text-center">
    <img src="/{{ cuba_logo }}" alt="Logo CUBA" class="img-fluid mb-2" style="width: 100px;">
    <h1 class="mb-0">Selecciona tu Campeonato</h1>
  </div>
</header>

<div class="container my-4">
  <div class="row justify-content-center g-4">
    {% for camp in campeonatos %}
    <div class="col-sm-6 col-md-4">
      <a href="{{ url_for('inscripcion_campeonato', camp_id=camp.id) }}" class="text-decoration-none">
        <div class="card shadow-sm h-100 text-center p-4 camp-card">
          <img src="/{{ camp.logo }}" alt="{{ camp.name }}"
               class="img-fluid mx-auto mb-3" style="max-height: 90px; width: auto; object-fit: contain;">
          <h4 class="card-title text-dark">{{ camp.name }}</h4>
          <p class="text-muted mb-0">{{ camp.title_main }} <strong>{{ camp.title_strong }}</strong></p>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>

<footer class="text-center py-3 mt-2 border-top">
  <a href="{{ url_for('admin_home') }}" class="text-muted small text-decoration-none">
    <i class="bi bi-gear"></i> Admin
  </a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
